spring.application.name=lieux-service
server.port=8084

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/data_lieux}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.locations=classpath:db/migration

auth.jwt.secret=${JWT_SECRET:pfe-dev-jwt-secret-key-change-me-min-32b!!}

# Validation de salle.concours_id auprès du service concours (JWT relayé).
concours.service.base-url=http://localhost:8083
