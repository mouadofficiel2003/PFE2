spring.application.name=auth-service
server.port=8081

# PostgreSQL (base auth, ex. PFE_Data). Schéma versionné par Flyway (classpath:db/migration).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/PFE_Data}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Flyway : migrations SQL sous src/main/resources/db/migration (ex. V1__init_auth_schema.sql).
spring.flyway.locations=classpath:db/migration

# JWT HS256 — au minimum 32 octets UTF-8 (modifier en production, idéalement variable d'environnement)
auth.jwt.secret=${JWT_SECRET:pfe-dev-jwt-secret-key-change-me-min-32b!!}
auth.jwt.expiration-ms=86400000
